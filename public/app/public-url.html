<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Domains | GITCAT</title>
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --card-bg: #111114;
            --text-primary: #e4e4e7;
            --text-secondary: #71717a;
            --border: rgba(255, 255, 255, 0.05);
            --neon-rainbow: linear-gradient(90deg, #6366f1, #a855f7, #ec4899, #f43f5e, #eab308, #14b8a6, #6366f1);
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: var(--font-family);
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
        }

        /* ノイズエフェクト継承 */
        .noise-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.035;
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            animation: noiseAnim 0.15s infinite;
        }

        @keyframes noiseAnim {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-1px, 1px); }
            40% { transform: translate(1px, -1px); }
            60% { transform: translate(-1px, -1px); }
            80% { transform: translate(1px, 1px); }
            100% { transform: translate(0, 0); }
        }

        @keyframes rainbowFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 30px;
            text-align: center;
            background: var(--neon-rainbow);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbowFlow 6s ease infinite;
        }

        .description {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 40px;
        }

        .url-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .url-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .url-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: var(--neon-rainbow);
            background-size: 300% 300%;
            opacity: 0;
            transition: 0.3s;
        }

        .url-card:hover {
            transform: translateY(-3px);
            border-color: rgba(168, 85, 247, 0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .url-card:hover::before {
            opacity: 1;
            animation: rainbowFlow 3s linear infinite;
        }

        .url-link {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            word-break: break-all;
        }
        .url-link:hover { color: #a855f7; }

        .url-date {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .loading-text {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

<div class="noise-overlay"></div>

<div class="container">
    <h1>Public Domains</h1>
    <p class="description">GITCATが展開されているパブリックドメイン（代替URL）の一覧です。</p>
    
    <div id="loading" class="loading-text">Firebaseからドメインリストを取得中...</div>
    <div class="url-list" id="urlList"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCPkgzCIOP3-ln0eX6043s2G3tyZu4uj18",
    authDomain: "message-site-d283b.firebaseapp.com",
    databaseURL: "https://message-site-d283b-default-rtdb.firebaseio.com",
    projectId: "message-site-d283b",
    storageBucket: "message-site-d283b.firebasestorage.app",
    messagingSenderId: "58182307350",
    appId: "1:58182307350:web:34a295f442ed2ce4ffaf37"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const dbRef = ref(db);
  const listContainer = document.getElementById('urlList');
  const loading = document.getElementById('loading');

  get(child(dbRef, `public_domains`)).then((snapshot) => {
    loading.style.display = 'none';
    if (snapshot.exists()) {
      const data = snapshot.val();
      Object.keys(data).forEach(key => {
          const item = data[key];
          
          const card = document.createElement('div');
          card.className = 'url-card';
          
          const date = new Date(item.timestamp).toLocaleDateString('ja-JP', { 
              year: 'numeric', month: 'short', day: 'numeric' 
          });

          card.innerHTML = `
              <a href="${item.url}" target="_blank" class="url-link">${item.url}</a>
              <span class="url-date">登録日: ${date}</span>
          `;
          listContainer.appendChild(card);
      });
    } else {
      listContainer.innerHTML = '<p style="color:var(--text-secondary); text-align:center; width:100%;">登録されているドメインはありません。</p>';
    }
  }).catch((error) => {
    loading.innerText = "読み込みエラーが発生しました。";
    console.error("Firebase err:", error);
  });
</script>

</body>
</html>
