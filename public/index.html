<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GITCAT | Proxy</title>
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/uv/sw.js", {
                    scope: __uv$config.prefix,
                });
            });
        }
    </script>
    
    <style>
        /* CSS: GITCAT Premium Minimalist Design */
        :root {
            --bg-color: #121212;
            --header-bg: #1e1e1e;
            --tab-inactive: #2a2a2a;
            --tab-active: #323232;
            --text-main: #e0e0e0;
            --accent-blue: #8ab4f8;
            --input-bg: #303134;
            --border-color: #444;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
        }

        /* アプリ全体のコンテナ */
        .browser-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* タブバー */
        .tab-bar {
            background-color: var(--header-bg);
            display: flex;
            align-items: flex-end;
            padding: 8px 10px 0 10px;
            gap: 4px;
            -webkit-user-select: none;
            user-select: none;
        }

        .tabs-list {
            display: flex;
            gap: 4px;
            max-width: calc(100% - 50px);
            overflow-x: auto;
        }

        .tabs-list::-webkit-scrollbar { height: 0; }

        .tab {
            background-color: var(--tab-inactive);
            color: #aaa;
            padding: 8px 16px;
            border-radius: 10px 10px 0 0;
            min-width: 120px;
            max-width: 200px;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            border: 1px solid transparent;
            border-bottom: none;
        }

        .tab.active {
            background-color: var(--tab-active);
            color: var(--text-main);
            border-color: var(--border-color);
        }

        .tab:hover:not(.active) {
            background-color: #353535;
        }

        .tab-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 8px;
        }

        .close-tab {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: var(--transition);
        }

        .close-tab:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .add-tab-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 20px;
            padding: 5px 12px;
            cursor: pointer;
            border-radius: 50%;
            margin-bottom: 4px;
            transition: var(--transition);
        }

        .add-tab-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* ナビゲーションバー */
        .nav-bar {
            background-color: var(--tab-active);
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-controls {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            font-size: 18px;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .nav-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .url-input-container {
            flex-grow: 1;
            display: flex;
            background-color: var(--input-bg);
            border-radius: 20px;
            padding: 5px 20px;
            align-items: center;
            border: 1px solid transparent;
            transition: var(--transition);
        }

        .url-input-container:focus-within {
            border-color: var(--accent-blue);
            box-shadow: 0 0 5px rgba(138, 180, 248, 0.3);
        }

        #urlInput {
            background: none;
            border: none;
            color: white;
            width: 100%;
            padding: 5px;
            outline: none;
            font-size: 14px;
        }

        /* 読み込みアニメーション */
        .loading-bar-container {
            height: 3px;
            width: 100%;
            background-color: transparent;
            position: relative;
            overflow: hidden;
        }

        .loading-bar {
            height: 100%;
            width: 0%;
            background-color: var(--accent-blue);
            transition: width 0.3s;
            position: absolute;
        }

        /* ビューポート（iframes） */
        .viewport {
            flex-grow: 1;
            background-color: #fff;
            position: relative;
        }

        .iframe-window {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
        }

        .iframe-window.active {
            display: block;
        }

        /* ブランディング */
        .gitcat-logo {
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--accent-blue);
            margin-right: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="browser-container">
    <div class="tab-bar">
        <div class="gitcat-logo">GITCAT</div>
        <div class="tabs-list" id="tabsList">
            </div>
        <button class="add-tab-btn" id="addTabBtn">+</button>
    </div>

    <div class="nav-bar">
        <div class="nav-controls">
            <button class="nav-btn" onclick="goHome()">🏠</button>
            <button class="nav-btn" onclick="reloadTab()">↻</button>
        </div>
        <div class="url-input-container">
            <input type="text" id="urlInput" placeholder="URLを入力するか、Googleで検索">
        </div>
        <button id="searchButton" style="display:none;">Search</button>
    </div>

    <div class="loading-bar-container">
        <div class="loading-bar" id="loadingBar"></div>
    </div>

    <div class="viewport" id="viewport">
        </div>
</div>

<script>
    let tabs = [];
    let activeTabId = null;
    let tabCount = 0;

    const tabsList = document.getElementById('tabsList');
    const viewport = document.getElementById('viewport');
    const urlInput = document.getElementById('urlInput');
    const loadingBar = document.getElementById('loadingBar');

    // 初期タブ作成
    window.onload = () => {
        createNewTab();
    };

    function createNewTab() {
        tabCount++;
        const id = `tab-${tabCount}`;
        const tabData = {
            id: id,
            title: 'New Tab',
            url: ''
        };
        tabs.push(tabData);

        // タブのDOM作成
        const tabEl = document.createElement('div');
        tabEl.className = 'tab';
        tabEl.id = `btn-${id}`;
        tabEl.innerHTML = `
            <span class="tab-title">New Tab</span>
            <span class="close-tab" onclick="closeTab(event, '${id}')">×</span>
        `;
        tabEl.onclick = () => switchTab(id);
        tabsList.appendChild(tabEl);

        // iframeのDOM作成
        const iframe = document.createElement('iframe');
        iframe.className = 'iframe-window';
        iframe.id = `frame-${id}`;
        viewport.appendChild(iframe);

        // 読み込み完了時の処理
        iframe.onload = () => {
            stopLoading();
            try {
                // 可能であればタイトルを取得（同一オリジン制約があるためプロキシ経由で自動調整される）
                const title = iframe.contentWindow.document.title;
                if(title) updateTabTitle(id, title);
            } catch(e) {}
        };

        switchTab(id);
    }

    function switchTab(id) {
        activeTabId = id;
        
        // UIの更新
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.iframe-window').forEach(f => f.classList.remove('active'));

        const currentTab = document.getElementById(`btn-${id}`);
        const currentFrame = document.getElementById(`frame-${id}`);
        
        if(currentTab) currentTab.classList.add('active');
        if(currentFrame) currentFrame.classList.add('active');

        // URL入力欄の更新
        const tabData = tabs.find(t => t.id === id);
        urlInput.value = tabData.url || '';
    }

    function closeTab(event, id) {
        event.stopPropagation();
        if (tabs.length === 1) return; // 最後の1枚は閉じない

        tabs = tabs.filter(t => t.id !== id);
        document.getElementById(`btn-${id}`).remove();
        document.getElementById(`frame-${id}`).remove();

        if (activeTabId === id) {
            switchTab(tabs[tabs.length - 1].id);
        }
    }

    function updateTabTitle(id, title) {
        const tab = tabs.find(t => t.id === id);
        if (tab) {
            tab.title = title;
            const tabEl = document.querySelector(`#btn-${id} .tab-title`);
            if (tabEl) tabEl.innerText = title;
        }
    }

    // ナビゲーションロジック（元のロジックを維持・統合）
    function navigate() {
        let url = urlInput.value.trim();
        if (!url) return;

        startLoading();

        let searchUrl = "https://www.google.com/search?q=";
        if (!url.includes(".")) {
            url = searchUrl + encodeURIComponent(url);
        } else {
            if (!url.startsWith("http://") && !url.startsWith("https://")) {
                url = "https://" + url;
            }
        }

        const encodedUrl = __uv$config.prefix + __uv$config.encodeUrl(url);
        const currentFrame = document.getElementById(`frame-${activeTabId}`);
        
        // タブデータのURLを更新
        const tabData = tabs.find(t => t.id === activeTabId);
        tabData.url = url;

        currentFrame.src = encodedUrl;
    }

    function startLoading() {
        loadingBar.style.width = '30%';
        loadingBar.style.opacity = '1';
    }

    function stopLoading() {
        loadingBar.style.width = '100%';
        setTimeout(() => {
            loadingBar.style.opacity = '0';
            setTimeout(() => { loadingBar.style.width = '0%'; }, 300);
        }, 500);
    }

    function reloadTab() {
        const currentFrame = document.getElementById(`frame-${activeTabId}`);
        if(currentFrame.src) {
            startLoading();
            currentFrame.contentWindow.location.reload();
        }
    }

    function goHome() {
        const currentFrame = document.getElementById(`frame-${activeTabId}`);
        currentFrame.src = "";
        urlInput.value = "";
        updateTabTitle(activeTabId, "New Tab");
    }

    // イベントリスナー
    document.getElementById('addTabBtn').onclick = createNewTab;

    urlInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
            event.preventDefault();
            navigate();
        }
    });

    // 予備の検索ボタンロジック（非表示だが互換性のため維持）
    document.getElementById("searchButton").onclick = function (event) {
        event.preventDefault();
        navigate();
    };
</script>

</body>
</html>
