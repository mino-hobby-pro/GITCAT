<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GITCAT | Neon Proxy</title>
    
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/uv/sw.js", {
                    scope: __uv$config.prefix,
                });
            });
        }
    </script>
    
    <style>
        /* GITCAT ULTIMATE NEON DESIGN SYSTEM 
           Theme: Muted Modern Rainbow (派手すぎないネオン虹色)
        */
        :root {
            --bg-dark: #09090b;
            --header-bg: #141415;
            --tab-active: #202022;
            --tab-hover: #27272a;
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --input-bg: #18181b;
            --border: rgba(255, 255, 255, 0.08);
            /* 淡く美しいネオン虹色のグラデーション */
            --neon-rainbow: linear-gradient(90deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb, #e0c3fc, #ff9a9e);
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * { box-sizing: border-box; outline: none; }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: var(--font-family);
            background-color: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* 虹色アニメーションのキーフレーム */
        @keyframes rainbowGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .browser-app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* --- タブバー構造 --- */
        .header {
            background-color: var(--header-bg);
            padding: 8px 10px 0 10px;
            display: flex;
            align-items: flex-end;
            gap: 5px;
            z-index: 100;
        }

        .tabs-container {
            display: flex;
            gap: 4px;
            max-width: calc(100% - 60px);
            overflow-x: auto;
        }
        .tabs-container::-webkit-scrollbar { height: 0; }

        .tab {
            background-color: transparent;
            color: var(--text-secondary);
            height: 36px;
            min-width: 160px;
            max-width: 240px;
            padding: 0 15px;
            border-radius: 12px 12px 0 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
            position: relative;
            border: 1px solid transparent;
            border-bottom: none;
        }

        .tab.active {
            background-color: var(--tab-active);
            color: var(--text-primary);
            border-color: var(--border);
        }

        /* アクティブタブの上部にネオンのラインを入れる */
        .tab.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--neon-rainbow);
            background-size: 300% 300%;
            animation: rainbowGlow 6s ease infinite;
            border-radius: 12px 12px 0 0;
        }

        .tab:hover:not(.active) {
            background-color: var(--tab-hover);
        }

        .tab-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-grow: 1;
        }

        .tab-close {
            margin-left: 8px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: 0.2s;
        }

        .tab-close:hover {
            background-color: rgba(255, 255, 255, 0.15);
            color: #ff758c; /* 閉じるときは少し赤みを帯びる */
        }

        .new-tab-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 22px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-bottom: 2px;
            transition: 0.2s;
        }

        .new-tab-btn:hover { background-color: var(--tab-hover); }

        /* --- ナビゲーションバー --- */
        .nav-bar {
            background-color: var(--tab-active);
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 15px;
            border-bottom: 1px solid var(--border);
        }

        .nav-icon {
            cursor: pointer;
            color: var(--text-secondary);
            transition: 0.2s;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            user-select: none;
        }
        .nav-icon:hover { 
            color: var(--text-primary);
            background-color: rgba(255,255,255,0.1);
        }

        .address-bar-wrapper {
            flex-grow: 1;
            background-color: var(--input-bg);
            height: 32px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border: 1px solid transparent;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .address-bar-wrapper:focus-within {
            background-color: #000;
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 0 10px rgba(161, 196, 253, 0.15);
        }

        #urlInput {
            background: none;
            border: none;
            color: var(--text-primary);
            width: 100%;
            font-size: 14px;
            margin-left: 10px;
        }

        /* --- ケバブメニュー (右上の ⋮) --- */
        .menu-container {
            position: relative;
        }

        .dropdown-menu {
            position: absolute;
            top: 40px;
            right: 0;
            background-color: var(--header-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            width: 220px;
            display: none;
            flex-direction: column;
            z-index: 1000;
            overflow: hidden;
            padding: 5px 0;
            animation: fadeIn 0.2s ease;
        }

        .dropdown-menu.show { display: flex; }

        .menu-item {
            padding: 12px 20px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-primary);
            transition: background 0.2s;
            position: relative;
            z-index: 1;
        }

        /* メニューホバー時に美しいネオンテキストに変わる */
        .menu-item:hover {
            background-color: rgba(255,255,255,0.05);
        }
        .menu-item:hover::after {
            content: '';
            position: absolute;
            left: 0; top: 0; width: 3px; height: 100%;
            background: var(--neon-rainbow);
            background-size: 300% 300%;
            animation: rainbowGlow 4s ease infinite;
        }

        /* --- ローディングバー --- */
        .loader-container {
            height: 2px;
            width: 100%;
            background: transparent;
            position: relative;
        }
        .loader-fill {
            height: 100%;
            width: 0%;
            background: var(--neon-rainbow);
            background-size: 300% 300%;
            animation: rainbowGlow 3s ease infinite;
            box-shadow: 0 0 10px rgba(161, 196, 253, 0.4);
            transition: width 0.4s ease;
        }

        /* --- ビューポート --- */
        .viewport {
            flex-grow: 1;
            position: relative;
            background-color: var(--bg-dark);
        }

        .iframe-window {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            background-color: white;
            display: none;
        }
        .iframe-window.active { display: block; }

        /* --- ホームスクリーン --- */
        .home-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-dark);
            z-index: 10;
            transition: opacity 0.3s ease, visibility 0.3s;
        }

        .home-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* ネオン虹色のロゴ */
        .home-logo {
            font-size: 82px;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 40px;
            background: var(--neon-rainbow);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbowGlow 6s ease infinite, fadeInUp 0.8s ease;
            filter: drop-shadow(0 0 15px rgba(161, 196, 253, 0.2));
        }

        .home-search-wrapper {
            width: 100%;
            max-width: 580px;
            position: relative;
            animation: fadeInUp 0.8s ease;
        }

        .home-search-input {
            width: 100%;
            background-color: #1f1f22;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 14px 25px 14px 50px;
            font-size: 16px;
            color: white;
            transition: 0.3s;
        }

        .home-search-input:hover, .home-search-input:focus {
            background-color: #27272a;
            border-color: transparent;
            box-shadow: 0 0 0 2px rgba(161, 196, 253, 0.2);
        }

        .search-icon-home {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 18px;
        }

        /* アニメーション */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="browser-app">
    <header class="header">
        <div class="tabs-container" id="tabsList">
            </div>
        <button class="new-tab-btn" id="addTabBtn" title="新しいタブを開く">+</button>
    </header>

    <div class="nav-bar">
        <div class="nav-icon" onclick="goHome()" title="ホーム">🏠</div>
        <div class="nav-icon" onclick="reloadTab()" title="再読み込み">↻</div>
        <div class="address-bar-wrapper">
            <span style="color:var(--text-secondary); font-size: 14px;">✨</span>
            <input type="text" id="urlInput" placeholder="URLを入力するか、検索">
        </div>
        
        <div class="menu-container">
            <div class="nav-icon menu-btn" onclick="toggleMenu(event)" title="設定と管理">⋮</div>
            <div class="dropdown-menu" id="kebabMenu">
                <div class="menu-item" onclick="createNewTab()">新しいタブを開く</div>
                <div class="menu-item" onclick="openInAboutBlank()">about:blank</div>
                <div class="menu-item" onclick="panicToGoogle()">プライベートモードオフ</div>
                <div class="menu-item" onclick="openSettings()">設定</div>
            </div>
        </div>
        <button id="searchButton" style="display:none;">Search</button>
    </div>

    <div class="loader-container">
        <div class="loader-fill" id="loaderFill"></div>
    </div>

    <main class="viewport" id="viewport">
        <div class="home-screen" id="homeScreen">
            <div class="home-logo">GITCAT</div>
            <div class="home-search-wrapper">
                <span class="search-icon-home">🔍</span>
                <input type="text" class="home-search-input" id="homeSearchInput" placeholder="Google で検索または URL を入力">
            </div>
            <p style="color: var(--text-secondary); margin-top: 30px; font-size: 13px; opacity: 0.6;">
                Neon Secure Proxy Enabled
            </p>
        </div>
        </main>
</div>

<script>
    /* GITCAT BROWSER CORE LOGIC
      UVプロキシ処理と完全なUIロジック
    */
    let tabs = [];
    let activeTabId = null;
    let tabCount = 0;

    const tabsList = document.getElementById('tabsList');
    const viewport = document.getElementById('viewport');
    const urlInput = document.getElementById('urlInput');
    const homeSearchInput = document.getElementById('homeSearchInput');
    const loaderFill = document.getElementById('loaderFill');
    const homeScreen = document.getElementById('homeScreen');

    window.onload = () => { createNewTab(); };

    // --- タブ管理 ---
    function createNewTab() {
        tabCount++;
        const id = `tab-${tabCount}`;
        const tabData = { id: id, title: '新しいタブ', url: '', isHome: true };
        tabs.push(tabData);

        const tabEl = document.createElement('div');
        tabEl.className = 'tab';
        tabEl.id = `btn-${id}`;
        tabEl.innerHTML = `
            <span class="tab-title">新しいタブ</span>
            <span class="tab-close" onclick="closeTab(event, '${id}')">×</span>
        `;
        tabEl.onclick = () => switchTab(id);
        tabsList.appendChild(tabEl);

        const iframe = document.createElement('iframe');
        iframe.className = 'iframe-window';
        iframe.id = `frame-${id}`;
        viewport.appendChild(iframe);

        iframe.onload = () => {
            finishLoading();
            if (iframe.src && iframe.src !== "about:blank" && !iframe.src.endsWith("/setting")) {
                try {
                    const title = iframe.contentWindow.document.title;
                    if(title) updateTabTitle(id, title);
                } catch(e) {}
            }
        };

        switchTab(id);
        tabsList.scrollLeft = tabsList.scrollWidth;
        closeMenu(); // メニューが開いていれば閉じる
    }

    function switchTab(id) {
        activeTabId = id;
        const currentTab = tabs.find(t => t.id === id);

        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.iframe-window').forEach(f => f.classList.remove('active'));

        document.getElementById(`btn-${id}`).classList.add('active');
        document.getElementById(`frame-${id}`).classList.add('active');

        if (currentTab.isHome) {
            homeScreen.classList.remove('hidden');
            urlInput.value = "";
        } else {
            homeScreen.classList.add('hidden');
            urlInput.value = currentTab.url;
        }
    }

    function closeTab(event, id) {
        event.stopPropagation();
        if (tabs.length === 1) { goHome(); return; }

        const index = tabs.findIndex(t => t.id === id);
        tabs = tabs.filter(t => t.id !== id);
        document.getElementById(`btn-${id}`).remove();
        document.getElementById(`frame-${id}`).remove();

        if (activeTabId === id) {
            const nextTab = tabs[index] || tabs[index - 1];
            switchTab(nextTab.id);
        }
    }

    function updateTabTitle(id, title) {
        const tab = tabs.find(t => t.id === id);
        if (tab) {
            tab.title = title;
            const titleEl = document.querySelector(`#btn-${id} .tab-title`);
            if (titleEl) titleEl.innerText = title;
        }
    }

    // --- プロキシ ナビゲーション処理 (UVロジック完全維持) ---
    function processNavigation(inputUrl) {
        let url = inputUrl.trim();
        if (!url) return;

        startLoading();

        let searchUrl = "https://www.google.com/search?q=";
        if (!url.includes(".")) {
            url = searchUrl + encodeURIComponent(url);
        } else {
            if (!url.startsWith("http://") && !url.startsWith("https://")) {
                url = "https://" + url;
            }
        }

        // UV Configによるエンコード処理
        const encodedUrl = __uv$config.prefix + __uv$config.encodeUrl(url);
        const currentFrame = document.getElementById(`frame-${activeTabId}`);
        const currentTab = tabs.find(t => t.id === activeTabId);

        currentTab.url = url;
        currentTab.isHome = false;
        
        homeScreen.classList.add('hidden');
        urlInput.value = url;
        currentFrame.src = encodedUrl;
    }

    // --- メニュー機能実装 ---

    function toggleMenu(event) {
        event.stopPropagation();
        document.getElementById('kebabMenu').classList.toggle('show');
    }

    function closeMenu() {
        const menu = document.getElementById('kebabMenu');
        if (menu.classList.contains('show')) menu.classList.remove('show');
    }

    // 画面外クリックでメニューを閉じる
    window.onclick = function(event) {
        if (!event.target.matches('.menu-btn')) closeMenu();
    }

    // 1. about:blank 機能 (サイトのURLを自動読み取りabout:blankにフルスクリーン埋め込み)
    function openInAboutBlank() {
        const currentFrame = document.getElementById(`frame-${activeTabId}`);
        
        // ホーム画面や設定画面、まだ何も読み込んでいない場合は弾く
        if (!currentFrame || !currentFrame.src || currentFrame.src === "about:blank" || currentFrame.src.endsWith("/setting")) {
            alert("ウェブサイトを開いてから実行してください。");
            closeMenu();
            return;
        }

        const win = window.open('about:blank', '_blank');
        if (!win) {
            alert("ポップアップがブロックされました。ブラウザの設定で許可してください。");
            return;
        }

        // about:blank内にiframeを展開し、現在のプロキシURLをそのまま引き継ぐ
        const iframe = win.document.createElement('iframe');
        iframe.style.width = '100vw';
        iframe.style.height = '100vh';
        iframe.style.border = 'none';
        iframe.style.margin = '0';
        iframe.src = currentFrame.src; // 既にエンコードされたUVプロキシURLを渡す
        
        win.document.body.style.margin = '0';
        win.document.body.appendChild(iframe);
        closeMenu();
    }

    // 2. プライベートモードオフ (緊急リダイレクト)
    function panicToGoogle() {
        window.location.href = 'https://www.google.com';
    }

    // 3. 設定画面の埋め込み
    function openSettings() {
        const currentFrame = document.getElementById(`frame-${activeTabId}`);
        const currentTab = tabs.find(t => t.id === activeTabId);
        
        startLoading();

        currentTab.isHome = false;
        currentTab.url = "gitcat://settings"; // 指定された表示URL
        currentTab.title = "設定";
        
        homeScreen.classList.add('hidden');
        urlInput.value = "gitcat://settings";
        
        // ページ内に /setting を埋め込む
        currentFrame.src = "/setting"; 
        
        updateTabTitle(activeTabId, "設定");
        closeMenu();
    }

    // --- UI コントロール ---
    function startLoading() {
        loaderFill.style.transition = "width 0.4s ease";
        loaderFill.style.width = "40%";
        loaderFill.style.opacity = "1";
    }

    function finishLoading() {
        loaderFill.style.width = "100%";
        setTimeout(() => {
            loaderFill.style.opacity = "0";
            setTimeout(() => { loaderFill.style.width = "0%"; }, 300);
        }, 400);
    }

    function reloadTab() {
        const currentTab = tabs.find(t => t.id === activeTabId);
        if (!currentTab.isHome) {
            startLoading();
            document.getElementById(`frame-${activeTabId}`).contentWindow.location.reload();
        }
    }

    function goHome() {
        const currentTab = tabs.find(t => t.id === activeTabId);
        currentTab.isHome = true;
        currentTab.url = "";
        currentTab.title = "新しいタブ";
        updateTabTitle(activeTabId, "新しいタブ");
        
        const frame = document.getElementById(`frame-${activeTabId}`);
        frame.src = "about:blank";
        urlInput.value = "";
        homeScreen.classList.remove('hidden');
    }

    // --- イベントリスナー ---
    document.getElementById('addTabBtn').onclick = createNewTab;

    urlInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") processNavigation(urlInput.value);
    });

    homeSearchInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            processNavigation(homeSearchInput.value);
            homeSearchInput.value = ""; // 検索後は入力をクリア
        }
    });

    // 元のボタンロジックの互換性維持
    const searchBtn = document.getElementById("searchButton");
    if(searchBtn) {
        searchBtn.onclick = (e) => {
            e.preventDefault();
            processNavigation(urlInput.value);
        };
    }
</script>

</body>
</html>
