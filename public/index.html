<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GITCAT | Ultra Modern Proxy</title>
    
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/uv/sw.js", {
                    scope: __uv$config.prefix,
                });
            });
        }
    </script>
    
    <style>
        :root {
            --bg-dark: #050506; 
            --header-bg: #0d0d0f;
            --tab-active: #141417;
            --tab-hover: #1c1c21;
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --input-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.06);
            --neon-rainbow: linear-gradient(135deg, #6366f1, #a855f7, #ec4899, #f43f5e, #fbbf24, #10b981, #6366f1);
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * { box-sizing: border-box; outline: none; }
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: var(--font-family); background-color: var(--bg-dark);
            color: var(--text-primary); overflow: hidden;
        }


        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9999; opacity: 0.02;
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="n"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.9"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23n)"/%3E%3C/svg%3E');
            animation: noiseAnim 0.2s infinite;
        }
        @keyframes noiseAnim {
            0% { transform: translate(0,0); } 10% { transform: translate(-1px,-1px); }
            50% { transform: translate(1px, 1px); } 100% { transform: translate(0,0); }
        }

        @keyframes rainbowFlow {
            0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
        }

        .browser-app { display: flex; flex-direction: column; height: 100vh; width: 100vw; position: relative; z-index: 1; }


        .header {
            background-color: var(--header-bg); padding: 10px 12px 0;
            display: flex; align-items: flex-end; gap: 6px; z-index: 100;
        }
        .tabs-container { display: flex; gap: 4px; overflow-x: auto; flex-grow: 1; }
        .tabs-container::-webkit-scrollbar { height: 0; }
        
        .tab {
            background-color: transparent; color: var(--text-secondary); height: 38px;
            min-width: 140px; max-width: 220px; padding: 0 12px; border-radius: 8px 8px 0 0;
            display: flex; align-items: center; cursor: pointer; font-size: 12px;
            transition: 0.2s; position: relative; border: 1px solid transparent;
        }
        .tab.active { background-color: var(--tab-active); color: var(--text-primary); border-color: var(--border); border-bottom: none; }
        .tab.active::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--neon-rainbow); background-size: 300%; animation: rainbowFlow 5s linear infinite;
        }
        .tab:hover:not(.active) { background-color: var(--tab-hover); }

        .tab-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1; }
        .tab-close { margin-left: 8px; opacity: 0.5; font-size: 14px; }
        .tab-close:hover { opacity: 1; color: #f43f5e; }

        .new-tab-btn {
            background: none; border: none; color: var(--text-primary); font-size: 20px;
            cursor: pointer; width: 34px; height: 34px; border-radius: 50%; margin-bottom: 4px; transition: 0.2s;
        }
        .new-tab-btn:hover { background: var(--tab-hover); }


        .nav-bar {
            background-color: var(--tab-active); height: 48px; display: flex;
            align-items: center; padding: 0 15px; gap: 12px; border-bottom: 1px solid var(--border);
        }
        .nav-icon {
            cursor: pointer; color: var(--text-secondary); width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center; border-radius: 8px; transition: 0.2s;
        }
        .nav-icon:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }

        .address-bar-wrapper {
            flex-grow: 1; background-color: var(--input-bg); height: 32px;
            border-radius: 8px; display: flex; align-items: center; padding: 0 12px;
            border: 1px solid var(--border); transition: 0.3s;
        }
        .address-bar-wrapper:focus-within { border-color: #6366f1; background: #000; box-shadow: 0 0 10px rgba(99,102,241,0.2); }
        #urlInput { background: none; border: none; color: white; width: 100%; font-size: 13px; margin-left: 8px; }


        .loader-container { height: 2px; width: 100%; background: transparent; position: relative; }
        .loader-fill { height: 100%; width: 0%; background: var(--neon-rainbow); background-size: 300%; animation: rainbowFlow 2s linear infinite; transition: width 0.3s; }


        .viewport { flex-grow: 1; position: relative; background: #000; }
        .iframe-window { width: 100%; height: 100%; border: none; position: absolute; display: none; background: white; }
        .iframe-window.active { display: block; }


        .home-screen {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: var(--bg-dark); z-index: 10;
        }
        .home-screen.hidden { opacity: 0; visibility: hidden; }

        .home-logo {
            font-size: 80px; font-weight: 900; letter-spacing: -3px; margin-bottom: 40px;
            background: var(--neon-rainbow); background-size: 300%; -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; animation: rainbowFlow 8s linear infinite;
        }

        .home-search-wrapper {
            width: 100%; max-width: 560px; position: relative; padding: 1px;
            background: rgba(255,255,255,0.1); border-radius: 12px; transition: 0.3s;
        }
        .home-search-wrapper:focus-within { background: var(--neon-rainbow); background-size: 300%; animation: rainbowFlow 5s linear infinite; }
        .home-search-input {
            width: 100%; background: #0d0d0f; border: none; border-radius: 11px;
            padding: 16px 20px 16px 48px; font-size: 16px; color: white;
        }

        .search-icon-home { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); z-index: 2; }

        .home-shortcuts { display: flex; gap: 30px; margin-top: 50px; }
        .shortcut-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; }
        .shortcut-icon {
            width: 54px; height: 54px; border-radius: 16px; background: #141417;
            border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
            margin-bottom: 12px; color: var(--text-secondary); transition: 0.3s;
        }
        .shortcut-item:hover .shortcut-icon { transform: translateY(-5px); border-color: #a855f7; color: white; background: #1c1c21; }
        .shortcut-label { font-size: 12px; color: var(--text-secondary); }

        /* ケバブメニュー */
        .menu-container { position: relative; }
        .dropdown-menu {
            position: absolute; top: 40px; right: 0; background: #111114;
            border: 1px solid var(--border); border-radius: 12px; width: 220px;
            display: none; flex-direction: column; z-index: 1000; padding: 8px 0; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .dropdown-menu.show { display: flex; }
        .menu-item { padding: 12px 20px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .menu-item:hover { background: #1c1c21; color: #a855f7; }
    </style>
</head>
<body>

<div class="noise-overlay"></div>

<div class="browser-app">
    <header class="header">
        <div class="tabs-container" id="tabsList"></div>
        <button class="new-tab-btn" id="addTabBtn">+</button>
    </header>

    <div class="nav-bar">
        <div class="nav-icon" onclick="goHome()">🏠</div>
        <div class="nav-icon" onclick="reloadTab()">↻</div>
        <div class="address-bar-wrapper">
            <input type="text" id="urlInput" placeholder="URLまたは検索キーワードを入力">
        </div>
        <div class="menu-container">
            <div class="nav-icon menu-btn" onclick="toggleMenu(event)">⋮</div>
            <div class="dropdown-menu" id="kebabMenu">
                <div class="menu-item" onclick="createNewTab()">新しいタブ</div>
                <div class="menu-item" onclick="openInAboutBlank()">about:blankで開く</div>
                <div class="menu-item" onclick="panicToGoogle()">パニックボタン</div>
                <div class="menu-item" onclick="openInternalPage('gitcat://settings', '/setting', '設定')">設定</div>
            </div>
        </div>
    </div>

    <div class="loader-container"><div class="loader-fill" id="loaderFill"></div></div>

    <main class="viewport" id="viewport">
        <div class="home-screen" id="homeScreen">
            <div class="home-logo">GITCAT</div>
            <div class="home-search-wrapper">
                <span class="search-icon-home">🔍</span>
                <input type="text" class="home-search-input" id="homeSearchInput" placeholder="Google 検索または URL">
            </div>
            <div class="home-shortcuts">
                <div class="shortcut-item" onclick="openInternalPage('gitcat://labo5', '/labo5', 'Labo5')">
                    <div class="shortcut-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg></div>
                    <div class="shortcut-label">Labo5</div>
                </div>
                <div class="shortcut-item" onclick="openInternalPage('gitcat://games', '/games', 'GAMES')">
                    <div class="shortcut-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg></div>
                    <div class="shortcut-label">GAMES</div>
                </div>
                <div class="shortcut-item" onclick="openInternalPage('gitcat://public-url', '/public-url.html', 'URL-List')">
                    <div class="shortcut-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg></div>
                    <div class="shortcut-label">URL-List</div>
                </div>
            </div>
        </div>
    </main>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getDatabase, ref, get, set, child } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCPkgzCIOP3-ln0eX6043s2G3tyZu4uj18",
    authDomain: "message-site-d283b.firebaseapp.com",
    databaseURL: "https://message-site-d283b-default-rtdb.firebaseio.com",
    projectId: "message-site-d283b",
    storageBucket: "message-site-d283b.firebasestorage.app",
    messagingSenderId: "58182307350",
    appId: "1:58182307350:web:34a295f442ed2ce4ffaf37",
    measurementId: "G-BGT7PTEVK2"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const currentUrl = window.location.origin;

  if (!currentUrl.includes("projects") && !currentUrl.includes("private")) {
      const safeKey = btoa(currentUrl).replace(/[=+/]/g, '_');
      const dbRef = ref(db);

      get(child(dbRef, `public_domains/${safeKey}`)).then((snapshot) => {
        if (!snapshot.exists()) {
          set(ref(db, `public_domains/${safeKey}`), {
            url: currentUrl,
            timestamp: Date.now()
          });
        }
      });
  }
</script>

<script>
    let tabs = []; let activeTabId = null; let tabCount = 0;
    const tabsList = document.getElementById('tabsList');
    const viewport = document.getElementById('viewport');
    const urlInput = document.getElementById('urlInput');
    const homeSearchInput = document.getElementById('homeSearchInput');
    const loaderFill = document.getElementById('loaderFill');
    const homeScreen = document.getElementById('homeScreen');

    window.onload = () => createNewTab();

    function createNewTab() {
        tabCount++; const id = `tab-${tabCount}`;
        tabs.push({ id, title: '新しいタブ', url: '', isHome: true });
        const tabEl = document.createElement('div');
        tabEl.className = 'tab'; tabEl.id = `btn-${id}`;
        tabEl.innerHTML = `<span class="tab-title">新しいタブ</span><span class="tab-close" onclick="closeTab(event,'${id}')">×</span>`;
        tabEl.onclick = () => switchTab(id);
        tabsList.appendChild(tabEl);
        const iframe = document.createElement('iframe');
        iframe.className = 'iframe-window'; iframe.id = `frame-${id}`;
        viewport.appendChild(iframe);
        iframe.onload = () => { finishLoading(); try { const t = iframe.contentWindow.document.title; if(t) updateTabTitle(id, t); } catch(e){} };
        switchTab(id);
    }

    function switchTab(id) {
        activeTabId = id; const t = tabs.find(x => x.id === id);
        document.querySelectorAll('.tab, .iframe-window').forEach(el => el.classList.remove('active'));
        document.getElementById(`btn-${id}`).classList.add('active');
        document.getElementById(`frame-${id}`).classList.add('active');
        if(t.isHome) { homeScreen.classList.remove('hidden'); urlInput.value = ""; }
        else { homeScreen.classList.add('hidden'); urlInput.value = t.url; }
    }

    function closeTab(e, id) { e.stopPropagation(); if(tabs.length === 1) return goHome(); const idx = tabs.findIndex(x => x.id === id); tabs = tabs.filter(x => x.id !== id); document.getElementById(`btn-${id}`).remove(); document.getElementById(`frame-${id}`).remove(); if(activeTabId === id) switchTab(tabs[idx] ? tabs[idx].id : tabs[idx-1].id); }
    function updateTabTitle(id, title) { const t = tabs.find(x => x.id === id); if(t){ t.title = title; document.querySelector(`#btn-${id} .tab-title`).innerText = title; } }
    function openInternalPage(u, p, t) { const f = document.getElementById(`frame-${activeTabId}`); const tab = tabs.find(x => x.id === activeTabId); startLoading(); tab.isHome = false; tab.url = u; tab.title = t; homeScreen.classList.add('hidden'); urlInput.value = u; f.src = p; updateTabTitle(activeTabId, t); closeMenu(); }

    function processNavigation(u) {
        let url = u.trim(); if(!url) return;
        if(url === "gitcat://labo5") return openInternalPage(url, "/labo5", "Labo5");
        if(url === "gitcat://games") return openInternalPage(url, "/games", "GAMES");
        if(url === "gitcat://public-url") return openInternalPage(url, "/public-url.html", "URL-List");
        startLoading();
        if(!url.includes(".")) url = "https://www.google.com/search?q=" + encodeURIComponent(url);
        else if(!url.startsWith("http")) url = "https://" + url;
        const encoded = __uv$config.prefix + __uv$config.encodeUrl(url);
        const f = document.getElementById(`frame-${activeTabId}`);
        const tab = tabs.find(x => x.id === activeTabId);
        tab.url = url; tab.isHome = false; homeScreen.classList.add('hidden'); urlInput.value = url; f.src = encoded;
    }

    function toggleMenu(e) { e.stopPropagation(); document.getElementById('kebabMenu').classList.toggle('show'); }
    function closeMenu() { document.getElementById('kebabMenu').classList.remove('show'); }
    window.onclick = (e) => { if(!e.target.matches('.menu-btn')) closeMenu(); };

    function openInAboutBlank() {
        const f = document.getElementById(`frame-${activeTabId}`);
        if(!f.src || f.src.includes(location.origin)) return alert("外部サイトを開いてください");
        const w = window.open('about:blank','_blank');
        const i = w.document.createElement('iframe');
        i.style = "width:100vw;height:100vh;border:none;margin:0;"; i.src = f.src;
        w.document.body.style.margin = "0"; w.document.body.appendChild(i);
    }
    function panicToGoogle() { location.href = "https://google.com"; }
    function startLoading() { loaderFill.style.width = "40%"; loaderFill.style.opacity = "1"; }
    function finishLoading() { loaderFill.style.width = "100%"; setTimeout(()=>loaderFill.style.opacity="0", 400); }
    function reloadTab() { const t = tabs.find(x => x.id === activeTabId); if(!t.isHome) { startLoading(); document.getElementById(`frame-${activeTabId}`).contentWindow.location.reload(); } }
    function goHome() { const t = tabs.find(x => x.id === activeTabId); t.isHome = true; updateTabTitle(activeTabId, "新しいタブ"); document.getElementById(`frame-${activeTabId}`).src = "about:blank"; urlInput.value = ""; homeScreen.classList.remove('hidden'); }
    document.getElementById('addTabBtn').onclick = createNewTab;
    urlInput.onkeydown = (e) => { if(e.key === "Enter") processNavigation(urlInput.value); };
    homeSearchInput.onkeydown = (e) => { if(e.key === "Enter") processNavigation(homeSearchInput.value); };
</script>
</body>
</html>
